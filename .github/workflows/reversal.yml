name: Reversal Checker

on:
  schedule:
    # 22:00 UTC Mon-Fri = AFTER US close (recommended, full daily candle).
    - cron: '0 22 * * 1-5'
    # MORNING option (~1h after open, EDT). Uncomment + set MORNING_MODE: "true".
    # - cron: '30 14 * * 1-5'
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run reversal checker
        env:
          TICKERS: "ORCL"                 # e.g. "ORCL,RKLB,QCOM,TEM,GEHC"
          MIN_SIGNALS: "4"
          MORNING_MODE: "false"           # "true" if you use the morning cron
          EMAIL_ONLY_ON_TRIGGER: "false"  # "true" = email only when a BUY triggers
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python reversal_checker.py

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git commit -m "reversal report $(date -u +%F)" || echo "no changes"
          git push || echo "nothing to push"
